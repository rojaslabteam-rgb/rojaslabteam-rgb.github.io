name: Sync Publications From Google Scholar

on:
  workflow_dispatch:
  schedule:
    # Every Monday morning (13:00 UTC ~= 8am EST / 9am EDT)
    - cron: "0 13 * * 1"

jobs:
  sync-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly

      - name: Generate publication markdown from Google Scholar
        run: python scripts/fetch_google_scholar_publications.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _publications
          git commit -m "Automated update of publications from Google Scholar" || echo "No changes to commit"
          git push
